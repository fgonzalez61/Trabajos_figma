<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="stylesheet" href="resources/css/styles.css">
    <title>Empanadas Pepe</title>
</head>

<body>
    <div class="contenedorPrincipal">
        <header>
            <div class="degradado"></div>
            <div class="textoBienvenida">
                <h1>¡Bienvenidxs a Empanadas Pepe!</h1>
                <p>Disfruta de nuestras deliciosas empanadas caseras.</p>
            </div>
            <div class="buscador">
              <i class="fa fa-location-dot"></i>
              <input type="text" placeholder="Buscá tu restaurante">
              <button class="fa fa-user"></button>
            </div>

        </header>
        <main>
            <section class="categorias">
                <a href="#" class="item-cate">
                    <i class="fa fa-burger"></i>
                    <span>Burgers</span>
                </a>

                <a href="#" class="item-cate">
                    <i class="fa fa-coffee"></i>
                    <span>Coffee</span>
                </a>

                <a href="#" class="item-cate">
                    <i class="fa fa-cake"></i>
                    <span>Cake</span>
                </a>

                <a href="#" class="item-cate">
                    <i class="fa fa-fish"></i>
                    <span>Fish</span>
                </a>

                <a href="#" class="item-cate">
                    <i class="fa fa-beer"></i>
                    <span>Beer</span>
                </a>

                <a href="#" class="item-cate">
                    <i class="fa fa-ice-cream"></i>
                    <span>Ice Cream</span>
                </a>

            </section>
            <section class="resto"></section>
        </main>


    </div>

</body>

</html>
